<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">

        <!-- LEFT COLUMN -->
        <div class="col-left">
            <!-- Header -->
            <div class="header">
                <div class="header-icon">
                    <i class="fas fa-cloud-arrow-down"></i>
                </div>
                <div>
                    <h1>Downloader</h1>
                    <p class="subtitle">Videos, music &amp; playlists</p>
                </div>
            </div>

            <!-- URL Input -->
            <div class="input-card">
                <div class="input-wrap" id="input-wrap">
                    <i class="fas fa-link input-icon"></i>
                    <input type="url" id="url-input" placeholder="Paste a YouTube URL…" autocomplete="off" spellcheck="false">
                    <button id="fetch-btn" aria-label="Fetch">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- Loading shimmer — single video -->
            <div id="shimmer-single" class="content-card hidden" aria-hidden="true">
                <div class="shimmer-hero">
                    <div class="shimmer-thumb shimmer"></div>
                    <div class="shimmer-meta">
                        <div class="shimmer-line shimmer" style="width:52px;height:10px;border-radius:6px;"></div>
                        <div class="shimmer-line shimmer" style="width:90%;height:14px;margin-top:8px;"></div>
                    </div>
                </div>
                <div class="shimmer-pills shimmer"></div>
                <div class="shimmer-btn shimmer"></div>
            </div>

            <!-- Loading shimmer — playlist -->
            <div id="shimmer-playlist" class="content-card hidden" aria-hidden="true">
                <div class="shimmer-header">
                    <div class="shimmer-line shimmer" style="width:110px;height:14px;"></div>
                    <div class="shimmer-line shimmer" style="width:32px;height:20px;border-radius:20px;"></div>
                </div>
                <div class="shimmer-pills shimmer"></div>
                <div class="shimmer-select shimmer"></div>
                <div class="shimmer-rows">
                    <div class="shimmer-row">
                        <div class="shimmer-check shimmer"></div>
                        <div class="shimmer-rowthumb shimmer"></div>
                        <div class="shimmer-rowinfo">
                            <div class="shimmer-line shimmer" style="width:75%;height:13px;"></div>
                            <div class="shimmer-line shimmer" style="width:36px;height:10px;margin-top:6px;"></div>
                        </div>
                    </div>
                    <div class="shimmer-row">
                        <div class="shimmer-check shimmer"></div>
                        <div class="shimmer-rowthumb shimmer"></div>
                        <div class="shimmer-rowinfo">
                            <div class="shimmer-line shimmer" style="width:60%;height:13px;"></div>
                            <div class="shimmer-line shimmer" style="width:40px;height:10px;margin-top:6px;"></div>
                        </div>
                    </div>
                    <div class="shimmer-row">
                        <div class="shimmer-check shimmer"></div>
                        <div class="shimmer-rowthumb shimmer"></div>
                        <div class="shimmer-rowinfo">
                            <div class="shimmer-line shimmer" style="width:85%;height:13px;"></div>
                            <div class="shimmer-line shimmer" style="width:30px;height:10px;margin-top:6px;"></div>
                        </div>
                    </div>
                    <div class="shimmer-row">
                        <div class="shimmer-check shimmer"></div>
                        <div class="shimmer-rowthumb shimmer"></div>
                        <div class="shimmer-rowinfo">
                            <div class="shimmer-line shimmer" style="width:50%;height:13px;"></div>
                            <div class="shimmer-line shimmer" style="width:44px;height:10px;margin-top:6px;"></div>
                        </div>
                    </div>
                </div>
                <div class="shimmer-btn shimmer"></div>
            </div>

            <!-- Playlist Section -->
            <div id="playlist-section" class="content-card hidden">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-list"></i>
                        <span id="playlist-title-text">Playlist</span>
                    </div>
                    <span class="badge" id="total-count">0</span>
                </div>

                <div class="quality-section">
                    <div class="format-tabs" id="pl-format-tabs">
                        <button class="fmt-tab active" data-fmt="video">
                            <i class="fas fa-film"></i> Video
                        </button>
                        <button class="fmt-tab" data-fmt="audio">
                            <i class="fas fa-music"></i> Audio
                        </button>
                    </div>
                    <div class="quality-row" id="pl-video-row">
                        <span class="quality-label">Quality</span>
                        <div class="quality-pills">
                            <input type="radio" name="quality" id="q-1080" value="1080">
                            <label for="q-1080">1080p</label>
                            <input type="radio" name="quality" id="q-720" value="720" checked>
                            <label for="q-720">720p</label>
                            <input type="radio" name="quality" id="q-480" value="480">
                            <label for="q-480">480p</label>
                            <input type="radio" name="quality" id="q-360" value="360">
                            <label for="q-360">360p</label>
                        </div>
                    </div>
                    <div class="quality-row hidden" id="pl-audio-row">
                        <span class="quality-label">Bitrate</span>
                        <div class="quality-pills">
                            <input type="radio" name="quality-audio" id="qa-320" value="320k">
                            <label for="qa-320">320k</label>
                            <input type="radio" name="quality-audio" id="qa-192" value="192k" checked>
                            <label for="qa-192">192k</label>
                            <input type="radio" name="quality-audio" id="qa-128" value="128k">
                            <label for="qa-128">128k</label>
                            <input type="radio" name="quality-audio" id="qa-96" value="96k">
                            <label for="qa-96">96k</label>
                        </div>
                    </div>
                </div>

                <div class="select-row">
                    <label class="check-label">
                        <input type="checkbox" id="select-all">
                        <span class="checkmark"></span>
                        <span>Select all</span>
                    </label>
                    <div class="select-row-right">
                        <span class="sel-count"><span id="selected-count">0</span> selected</span>
                        <button id="range-toggle-btn" class="range-toggle" title="Select by range">
                            <i class="fas fa-sliders"></i>
                            <span>Range</span>
                        </button>
                    </div>
                </div>

                <!-- Range Panel -->
                <div id="range-panel" class="range-panel hidden">
                    <div class="range-label">
                        <i class="fas fa-list-ol"></i>
                        <span>Select items from number to number</span>
                    </div>
                    <div class="range-inputs">
                        <div class="range-field">
                            <label for="range-from">From</label>
                            <input type="number" id="range-from" min="1" placeholder="1">
                        </div>
                        <div class="range-divider">—</div>
                        <div class="range-field">
                            <label for="range-to">To</label>
                            <input type="number" id="range-to" min="1" placeholder="10">
                        </div>
                        <button id="range-apply-btn" class="range-apply">
                            <i class="fas fa-check"></i>
                            Apply
                        </button>
                    </div>
                    <p id="range-error" class="range-error hidden"></p>
                </div>

                <div id="playlist-items"></div>

                <div class="btn-row">
                    <button id="deselect-btn" class="btn-ghost">
                        <i class="fas fa-xmark"></i>
                        <span>Clear</span>
                    </button>
                    <button id="download-selected-btn" class="btn-dl">
                        <i class="fas fa-download"></i>
                        <span>Download Selected</span>
                    </button>
                </div>
            </div>

            <!-- Single Section -->
            <div id="single-section" class="content-card hidden">
                <div class="single-hero">
                    <div id="single-thumb" class="single-thumb-wrap">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <div class="single-meta">
                        <p class="single-label">Video</p>
                        <p id="single-name" class="single-title">—</p>
                    </div>
                </div>

                <div class="quality-section">
                    <div class="format-tabs" id="sq-format-tabs">
                        <button class="fmt-tab active" data-fmt="video">
                            <i class="fas fa-film"></i> Video
                        </button>
                        <button class="fmt-tab" data-fmt="audio">
                            <i class="fas fa-music"></i> Audio
                        </button>
                    </div>
                    <div class="quality-row" id="sq-video-row">
                        <span class="quality-label">Quality</span>
                        <div class="quality-pills">
                            <input type="radio" name="single-quality" id="sq-1080" value="1080">
                            <label for="sq-1080">1080p</label>
                            <input type="radio" name="single-quality" id="sq-720" value="720" checked>
                            <label for="sq-720">720p</label>
                            <input type="radio" name="single-quality" id="sq-480" value="480">
                            <label for="sq-480">480p</label>
                            <input type="radio" name="single-quality" id="sq-360" value="360">
                            <label for="sq-360">360p</label>
                        </div>
                    </div>
                    <div class="quality-row hidden" id="sq-audio-row">
                        <span class="quality-label">Bitrate</span>
                        <div class="quality-pills">
                            <input type="radio" name="single-quality-audio" id="sqa-320" value="320k">
                            <label for="sqa-320">320k</label>
                            <input type="radio" name="single-quality-audio" id="sqa-192" value="192k" checked>
                            <label for="sqa-192">192k</label>
                            <input type="radio" name="single-quality-audio" id="sqa-128" value="128k">
                            <label for="sqa-128">128k</label>
                            <input type="radio" name="single-quality-audio" id="sqa-96" value="96k">
                            <label for="sqa-96">96k</label>
                        </div>
                    </div>
                </div>

                <button id="download-single-btn" class="btn-dl">
                    <i class="fas fa-download"></i>
                    <span>Download</span>
                </button>
            </div>
        </div>

        <!-- RIGHT COLUMN — Downloads -->
        <div class="col-right">
            <div class="downloads-panel">
                <div class="downloads-header">
                    <div class="card-title">
                        <i class="fas fa-arrow-down-to-line"></i>
                        <span>Downloads</span>
                    </div>
                    <div class="downloads-header-right">
                        <span class="badge badge-ghost" id="dl-count">0</span>
                        <button id="clear-history-btn" class="clear-history-btn" title="Clear finished downloads">
                            <i class="fas fa-broom"></i>
                        </button>
                    </div>
                </div>
                <div class="downloads-empty" id="downloads-empty">
                    <i class="fas fa-inbox"></i>
                    <p>No downloads yet</p>
                    <span>Paste a URL on the left to get started</span>
                </div>
                <div id="downloads"></div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
